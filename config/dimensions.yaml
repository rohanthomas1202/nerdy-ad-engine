# Evaluation Dimensions — 5 independent scoring axes

dimensions:
  - name: clarity
    weight: 0.20
    description: "How clear and easy to understand is the ad? Can a reader grasp the offer in under 5 seconds?"
    measures:
      - "Message comprehension speed"
      - "Absence of jargon or ambiguity"
      - "Logical flow from hook to CTA"
      - "Single clear value proposition (not multiple competing messages)"
    rubric:
      low: "1-3: Confusing, multiple competing messages, jargon-heavy, reader cannot quickly understand what is being offered or why they should care."
      mid: "4-6: Mostly clear but has minor ambiguities, slightly wordy, or the primary message takes a moment to extract. The value proposition is present but buried."
      high: "7-10: Crystal clear within 3 seconds. One unmistakable message, clean flow, the reader immediately knows the offer and the next step. No wasted words."
    calibration_examples:
      low_example:
        text: "Our comprehensive multi-faceted approach leverages cutting-edge pedagogical methodologies to synergistically enhance your child's standardized testing outcomes through personalized adaptive learning frameworks."
        expected_score: 2.5
        note: "Jargon-heavy, no clear offer, corporate speak"
      high_example:
        text: "Your SAT score can improve 200+ points. Our expert tutors create a personalized plan that targets your weak areas. Start with a free session."
        expected_score: 8.5
        note: "Clear offer, specific claim, obvious next step"

  - name: value_proposition
    weight: 0.25
    description: "How compelling is the offer? Does the ad clearly communicate WHY this product is worth the reader's attention and action?"
    measures:
      - "Specificity of benefit (concrete vs vague)"
      - "Differentiation from alternatives"
      - "Relevance to target audience's pain points"
      - "Credibility of claims"
    rubric:
      low: "1-3: Generic benefits that could apply to any tutor. No specifics, no differentiation. Claims are vague ('best tutors', 'great results') with no supporting evidence."
      mid: "4-6: Some specific benefits mentioned but not fully developed. Partial differentiation. Claims present but could be stronger or more grounded."
      high: "7-10: Irresistible offer with specific, credible benefits. Clear differentiation. The reader thinks 'this is exactly what I need.' Evidence-backed claims."
    calibration_examples:
      low_example:
        text: "We have the best tutors who will help your child succeed. Our program is designed for results. Sign up today!"
        expected_score: 3.0
        note: "Generic, no specifics, no differentiation"
      high_example:
        text: "1-on-1 SAT tutoring matched to your learning style. Students average 200+ point improvements. Unlike classroom prep, every session targets YOUR weak areas."
        expected_score: 8.0
        note: "Specific benefit, differentiated, credible claim"

  - name: call_to_action
    weight: 0.20
    description: "How effectively does the ad drive the reader to take the desired next step? Is there urgency, clarity, and low friction?"
    measures:
      - "CTA clarity (reader knows exactly what to do)"
      - "Urgency or motivation to act now"
      - "Low perceived friction (easy first step)"
      - "Alignment between CTA and ad message"
    rubric:
      low: "1-3: No clear CTA, or CTA disconnected from the ad message. High friction (requires commitment before value). No urgency."
      mid: "4-6: CTA present and relevant but lacks urgency or feels generic. Moderate friction. Reader understands the next step but isn't compelled."
      high: "7-10: CTA feels like the natural, irresistible next step. Low friction (free trial, no commitment). Urgency present without being pushy. Perfectly aligned with the ad's promise."
    calibration_examples:
      low_example:
        text: "Contact us to learn more about our various tutoring packages and pricing options for the upcoming academic year."
        expected_score: 2.5
        note: "High friction, vague, no urgency"
      high_example:
        text: "Book your free 30-minute strategy session this week — spots fill fast for spring SAT prep."
        expected_score: 8.5
        note: "Free, specific, time-bounded urgency, low friction"

  - name: brand_voice
    weight: 0.15
    description: "Does the ad sound like Varsity Tutors? Empowering, knowledgeable, approachable, results-focused — without being arrogant or fear-mongering."
    measures:
      - "Alignment with brand voice attributes"
      - "Appropriate tone for the target audience"
      - "Absence of off-brand language (fear, jargon, arrogance)"
      - "Feels human and conversational, not corporate"
    rubric:
      low: "1-3: Off-brand. Could be any tutoring company. Uses fear tactics, corporate jargon, or arrogant claims. Doesn't feel like Varsity Tutors."
      mid: "4-6: Somewhat on-brand but generic. Could be slightly more empowering or conversational. Minor tone issues."
      high: "7-10: Unmistakably Varsity Tutors. Empowering without being pushy, knowledgeable without jargon, approachable and warm. The reader feels supported, not sold to."
    calibration_examples:
      low_example:
        text: "Don't let your child fall behind! Without proper SAT prep, they'll miss out on top colleges. Our elite tutors are the only way to guarantee success."
        expected_score: 2.0
        note: "Fear-mongering, arrogant, 'guarantee' claim"
      high_example:
        text: "SAT prep doesn't have to be stressful. Our tutors meet students where they are, building confidence and skills one session at a time. Ready when you are."
        expected_score: 8.5
        note: "Empowering, approachable, no pressure"

  - name: emotional_resonance
    weight: 0.20
    description: "Does the ad connect emotionally with the target audience? Does it tap into real feelings, not just rational arguments?"
    measures:
      - "Emotional hook in the opening"
      - "Empathy for the audience's situation"
      - "Aspiration or relief offered"
      - "Authentic connection (not manipulative)"
    rubric:
      low: "1-3: Pure feature list with no emotional connection. Reads like a spec sheet. No empathy, no aspiration, no acknowledgment of the reader's feelings."
      mid: "4-6: Some emotional elements present but surface-level. Attempts empathy but feels generic or forced. Emotional hooks are present but not deeply resonant."
      high: "7-10: Deeply resonant. The reader feels seen and understood. The ad acknowledges their specific situation and offers genuine hope or relief. Emotional hook is authentic and compelling."
    calibration_examples:
      low_example:
        text: "Varsity Tutors offers SAT prep with experienced tutors, flexible scheduling, and comprehensive materials. Our platform supports multiple learning styles."
        expected_score: 2.5
        note: "Feature list, zero emotion, no empathy"
      high_example:
        text: "You've watched your child stress over practice tests, wondering if they'll ever feel ready. What if SAT prep could actually build their confidence — not just their score?"
        expected_score: 9.0
        note: "Deeply empathetic parent perspective, aspiration"
